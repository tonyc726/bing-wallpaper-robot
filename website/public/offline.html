<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>离线 - Horizon (地平线)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          'PingFang SC',
          'Hiragino Sans GB',
          'Microsoft YaHei',
          'Helvetica Neue',
          Helvetica,
          Arial,
          sans-serif;
        background: #000000;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        overflow: hidden;
      }

      .offline-container {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
        padding: 60px 40px;
        text-align: center;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        max-width: 480px;
        width: 90%;
        margin: 20px;
        animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      @keyframes slideUp {
        from {
          transform: translateY(40px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .offline-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 32px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }

      p {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.6;
        margin-bottom: 40px;
      }

      .retry-button {
        background: #ffffff;
        color: #000000;
        border: none;
        padding: 16px 40px;
        font-size: 16px;
        border-radius: 40px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-weight: 600;
        width: 100%;
        max-width: 200px;
      }

      .retry-button:hover {
        background: rgba(255, 255, 255, 0.9);
        transform: scale(1.02);
      }

      .retry-button:active {
        transform: scale(0.98);
      }

      .status {
        margin-top: 40px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .status.connected {
        color: #4caf50;
        background: rgba(76, 175, 80, 0.1);
      }

      .status.disconnected {
        color: #f44336;
        background: rgba(244, 67, 54, 0.1);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .checking {
        animation: pulse 2s infinite;
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📡</div>
      <h1>你当前处于离线状态</h1>
      <p>网络连接似乎出现了问题。不过别担心，你之前浏览过的壁纸仍然可以查看！</p>
      <button class="retry-button" onclick="window.location.reload()">重新连接</button>
      <div class="status disconnected" id="connectionStatus">
        <span class="checking">🔍 正在检查网络状态...</span>
      </div>
    </div>

    <script>
      // 检查网络状态
      function updateConnectionStatus() {
        const statusEl = document.getElementById('connectionStatus');

        if (navigator.onLine) {
          statusEl.className = 'status connected';
          statusEl.innerHTML = '✅ 网络已连接，正在重新加载...';
          setTimeout(() => {
            window.location.reload();
          }, 1000);
        } else {
          statusEl.className = 'status disconnected';
          statusEl.innerHTML = '❌ 网络未连接';
        }
      }

      // 监听网络状态变化
      window.addEventListener('online', updateConnectionStatus);
      window.addEventListener('offline', updateConnectionStatus);

      // 定期检查网络状态
      setInterval(updateConnectionStatus, 3000);

      // 初始检查
      updateConnectionStatus();
    </script>
  </body>
</html>
