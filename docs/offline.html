<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - Bing 壁纸机器人</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .offline-container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      margin: 20px;
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: #f5f5f5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 16px;
      color: #333;
    }

    p {
      font-size: 16px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .retry-button {
      background: #6750A4;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .retry-button:hover {
      background: #5a4494;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(103, 80, 164, 0.4);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 30px;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 14px;
      color: #666;
    }

    .status.connected {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status.disconnected {
      background: #ffebee;
      color: #c62828;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .checking {
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      📱
    </div>
    <h1>你当前处于离线状态</h1>
    <p>网络连接似乎出现了问题。不过别担心，你之前浏览过的壁纸仍然可以查看！</p>
    <button class="retry-button" onclick="window.location.reload()">重新连接</button>
    <div class="status disconnected" id="connectionStatus">
      <span class="checking">🔍 正在检查网络状态...</span>
    </div>
  </div>

  <script>
    // 检查网络状态
    function updateConnectionStatus() {
      const statusEl = document.getElementById('connectionStatus');

      if (navigator.onLine) {
        statusEl.className = 'status connected';
        statusEl.innerHTML = '✅ 网络已连接，正在重新加载...';
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      } else {
        statusEl.className = 'status disconnected';
        statusEl.innerHTML = '❌ 网络未连接';
      }
    }

    // 监听网络状态变化
    window.addEventListener('online', updateConnectionStatus);
    window.addEventListener('offline', updateConnectionStatus);

    // 定期检查网络状态
    setInterval(updateConnectionStatus, 3000);

    // 初始检查
    updateConnectionStatus();
  </script>
</body>
</html>
