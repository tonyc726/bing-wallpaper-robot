# This is a basic workflow to help you get started with Actions

name: Update Data

# Controls when the action will run.
on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    # тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА minute (0 - 59)
    # тФВ тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА hour (0 - 23)
    # тФВ тФВ тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА day of the month (1 - 31)
    # тФВ тФВ тФВ тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА month (1 - 12 or JAN-DEC)
    # тФВ тФВ тФВ тФВ тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА day of the week (0 - 6 or SUN-SAT)
    # тФВ тФВ тФВ тФВ тФВ
    # тФВ тФВ тФВ тФВ тФВ
    # тФВ тФВ тФВ тФВ тФВ
    # * * * * *
    - cron: '0 18 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout repo
        uses: actions/checkout@master

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 22.x

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Data
        id: fetch-message
        env:
          IMAGEKIT_PUBLIC_KEY: '${{ secrets.IMAGEKIT_PUBLIC_KEY }}'
          IMAGEKIT_PRIVATE_KEY: '${{ secrets.IMAGEKIT_PRIVATE_KEY }}'
          IMAGEKIT_URL_ENDPOINT: '${{ secrets.IMAGEKIT_URL_ENDPOINT }}'
        run: npm run fetch-data

      - name: Make Website
        run: npm run build

      - name: Publish to NPM
        run: |
          if [ "$(date +%m%d)" = "0101" ]; then
            npm version major --no-git-tag-version
          elif [ "$(date +%d)" = "01" ]; then
            npm version minor --no-git-tag-version
          else
            npm version patch --no-git-tag-version
          fi
          npm config set //registry.npmjs.org/:_authToken ${NODE_AUTH_TOKEN}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "${{ steps.fetch-message.outputs.COMMIT_MESSAGE }}" -a

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.ROBOT_TOKEN }}
          branch: ${{ github.ref }}
