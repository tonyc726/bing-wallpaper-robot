# Optimized Bing Wallpaper Robot Workflow
name: Update Data & Deploy

on:
  schedule:
    - cron: '0 18 * * *' # 北京时间凌晨 2 点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 如果你要用自定义 PAT (ROBOT_TOKEN) 覆盖默认 Token 以触发其他 Action，请在这里传入
          token: ${{ secrets.ROBOT_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 调换顺序：先安装 pnpm，后设置 node 与缓存
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Code Quality Check
        run: |
          pnpm run format:check
          pnpm run lint

      - name: Fetch & Process Data
        id: fetch-message
        env:
          IMAGEKIT_PUBLIC_KEY: '${{ secrets.IMAGEKIT_PUBLIC_KEY }}'
          IMAGEKIT_PRIVATE_KEY: '${{ secrets.IMAGEKIT_PRIVATE_KEY }}'
          IMAGEKIT_URL_ENDPOINT: '${{ secrets.IMAGEKIT_URL_ENDPOINT }}'
        run: pnpm run fetch-data

      - name: Full Application Build
        run: pnpm run build

      - name: Automate Version & Publish
        run: |
          if [ "$(date +%m%d)" = "0101" ]; then
            pnpm version major --no-git-tag-version
          elif [ "$(date +%d)" = "01" ]; then
            pnpm version minor --no-git-tag-version
          else
            pnpm version patch --no-git-tag-version
          fi
          npm config set //registry.npmjs.org/:_authToken ${NODE_AUTH_TOKEN}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Auto-Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .

          # 检查是否有改动，有改动才进行 commit 和 push
          if [ -n "$(git status --porcelain)" ]; then
            # 提供默认的回退 Commit Message，以防 outputs 拿不到值导致语法错误
            git commit -m "${{ steps.fetch-message.outputs.COMMIT_MESSAGE || 'chore: automated data update and build' }}"
            git push origin ${{ github.ref_name }}
          else
            echo "No changes to commit."
          fi
